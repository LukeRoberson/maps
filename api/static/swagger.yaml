openapi: 3.0.4

info:
  title: Printable Maps API
  version: 1.0.0
  description: |
    API for managing map projects, areas, boundaries, layers, annotations, and tile-based exports.

    This documentation is a scaffold — one endpoint per resource group is fully documented as a template.
    Look for `# TODO` comments indicating where to add remaining endpoints.

servers:
  - url: /
    description: Current server

tags:
  - name: Health
    description: Health check and configuration
  - name: Projects
    description: Manage map projects
  - name: Map Areas
    description: Manage map areas within projects (regions, suburbs, individuals)
  - name: Boundaries
    description: Manage polygon boundaries for map areas
  - name: Layers
    description: Manage layers within map areas
  - name: Annotations
    description: Manage annotations (markers, lines, polygons, text) within layers
  - name: Exports
    description: Generate and download PNG map exports
  - name: Tiles
    description: Proxy tile server for map rendering

paths:
  # ──────────────────────────────────────────────
  # Health / Config
  # app.py
  # ──────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          summary: Check API health
          description: Responds if the API is up. Does not check full database connectivity or tile server access.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /api/config:
    get:
      tags: [Health]
      summary: Get default configuration
      description: |
        Returns default map configuration values (e.g. default center and zoom) that the frontend can use when initializing a new project or map area.
      responses:
        '200':
          description: Default map configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  default_map:
                    type: object
                    properties:
                      center_lat:
                        type: number
                        example: -37.8136
                      center_lon:
                        type: number
                        example: 144.9631
                      zoom_level:
                        type: number
                        example: 13

  # ──────────────────────────────────────────────
  # Projects
  # projects.py
  # ──────────────────────────────────────────────
  /api/projects:
    get:
      tags: [Projects]
      summary: List all projects
      description: Returns an array of all map projects with their basic details. Does not include map areas or other nested data.
      responses:
        '200':
          description: Array of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Projects]
      summary: Create a project
      description: Create a new map project with the specified name and optional details. Returns the created project object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Project name
                description:
                  type: string
                  description: Project description
                  nullable: true
                center_lat:
                  type: number
                  Summary: Default latitude
                  description: |
                    Default centre latitude for maps in this project.
                    Defaults to the project latitude if not specified.
                  nullable: true
                center_lon:
                  type: number
                  Summary: Default longitude
                  description: |
                    Default centre longitude for maps in this project.
                    Defaults to the project longitude if not specified.
                  nullable: true
                zoom_level:
                  type: integer
                  Summary: Default zoom level
                  description: |
                    Default map zoom level
                    Defaults to the project zoom level if not specified.
                  nullable: true
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project details
      description: |
        Retrieve detailed information about a specific project.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
          description: Unique ID of the project to retrieve
      responses:
        '200':
          description: Project details with nested map areas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Projects]
      summary: Update a project
      description: |
        Update the details of an existing project. Only fields included in the request body will be updated; others will remain unchanged.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
          description: Unique ID of the project to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Project name
                  nullable: true
                description:
                  type: string
                  description: Project description
                  nullable: true
                center_lat:
                  type: number
                  description: Default latitude for maps in this project
                  nullable: true
                center_lon:
                  type: number
                  description: Default longitude for maps in this project
                  nullable: true
                zoom_level:
                  type: integer
                  description: Default zoom level for maps in this project
                  nullable: true
      responses:
        '200':
          description: Updated project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Projects]
      summary: Delete a project
      description: |
        Permanently delete a project and all associated map areas, boundaries, layers, and annotations. This action cannot be undone.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
          description: Unique ID of the project to delete
      responses:
        '204':
          description: Project deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Project deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/projects/{project_id}/export:
    get:
      tags: [Projects]
      summary: Export project data
      description: |
        Export all data for a project (including map areas, boundaries, layers, and annotations) in a structured JSON format.
        This can be used for backup or to transfer data between instances, or perform backups.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
          description: Unique ID of the project to export
      responses:
        '200':
          description: Exported project data
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: '1.0'
                    description: Export format version
                  export_date:
                    type: string
                    format: date-time
                    example: '2026-03-22T23:39:55.902527+00:00'
                    description: Timestamp of when the export was generated
                  project:
                    $ref: '#/components/schemas/Project'
                  map_areas:
                    type: array
                    items:
                      $ref: '#/components/schemas/MapArea'
                  boundaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Boundary'
                  layers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Layer'
                  annotations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Annotation'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/projects/import:
     post:
      tags: [Projects]
      summary: Import project data
      description: |
        Import project data from a JSON export file.
        The JSON structure should match the format produced by the GET /api/projects/{project_id}/export endpoint.
        This will create a new project with the imported data. If a project with the same name already exists, a unique suffix will be added to the name to avoid conflicts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: string
                  example: '1.0'
                  description: Version of the export schema (for future compatibility)
                export_date:
                  type: string
                  format: date-time
                  example: '2026-03-22T23:39:55.902527+00:00'
                  description: Timestamp of when the export was generated
                project:
                  $ref: '#/components/schemas/Project'
                map_areas:
                  type: array
                  items:
                    $ref: '#/components/schemas/MapArea'
                boundaries:
                  type: array
                  items:
                    $ref: '#/components/schemas/Boundary'
                layers:
                  type: array
                  items:
                    $ref: '#/components/schemas/Layer'
                annotations:
                  type: array
                  items:
                    $ref: '#/components/schemas/Annotation'
      responses:
        '201':
          description: Project imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────────
  # Map Areas
  # map.py
  # ──────────────────────────────────────────────
  /api/map-areas:
    get:
      tags: [Map Areas]
      summary: List map areas
      description: |
        Retrieve an array of map areas for a project ID.
        Optionally filter by parent map area ID (for hierarchy).
        If parent_id is not provided, returns all map areas for the project.
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: integer
          description: The ID of the project to list map areas for
        - name: parent_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter map areas by parent map area ID (for hierarchy)
      responses:
        '200':
          description: Array of map areas
          content:
            application/json:
              schema:
                type: object
                properties:
                  map_areas:
                    type: array
                    items:
                      $ref: '#/components/schemas/MapArea'
        '400':
          description: Missing required project_id parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Map Areas]
      summary: Create a map area
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - name
                - area_type
              properties:
                project_id:
                  type: integer
                  description: Parent project ID
                name:
                  type: string
                  description: Area name
                area_type:
                  type: string
                  enum: [region, suburb, individual]
                  description: Type of map area
                parent_id:
                  type: integer
                  description: Parent map area ID (for hierarchy)
                boundary_id:
                  type: integer
                  description: Associated boundary ID
                default_center_lat:
                  type: number
                  description: Default latitude
                default_center_lon:
                  type: number
                  description: Default longitude
                default_zoom:
                  type: number
                  description: Default zoom level
                tile_layer:
                  type: string
                  description: Preferred tile layer ID
      responses:
        '201':
          description: Created map area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapArea'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/map-areas/{map_area_id}:
    get:
      tags: [Map Areas]
      summary: Get a map area by ID
      description: |
        Retrieve details of a specific map area by its unique ID.
      parameters:
        - name: map_area_id
          in: path
          required: true
          schema:
            type: integer
          description: Map area ID
      responses:
        '200':
          description: Map area details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapArea'
        '404':
          description: Map area not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Map Areas]
      summary: Update a map area
      description: |
        Update the details of an existing map area.
        Only fields included in the request body will be updated; others will remain unchanged.
      parameters:
        - name: map_area_id
          in: path
          required: true
          schema:
            type: integer
          description: Map area ID
      requestBody:
        required: true
        description: |
          Fields to update for the map area.
          Not all fields are required; only include the fields you want to update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapArea'
      responses:
        '200':
          description: Updated map area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapArea'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Map area not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Map Areas]
      summary: Delete a map area
      parameters:
        - name: map_area_id
          in: path
          required: true
          schema:
            type: integer
          description: Map area ID
      responses:
        '200':
          description: Map area deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Map area deleted successfully
        '404':
          description: Map area not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ──────────────────────────────────────────────
  # Boundaries
  # ──────────────────────────────────────────────
  /api/boundaries/map-area/{map_area_id}:
    get:
      tags: [Boundaries]
      summary: Get boundary for a map area
      parameters:
        - name: map_area_id
          in: path
          required: true
          schema:
            type: integer
          description: Map area ID
      responses:
        '200':
          description: Boundary object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Boundary'
        '404':
          description: No boundary found for this map area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # TODO: Add POST /api/boundaries (body: map_area_id, coordinates)
  # TODO: Add PUT /api/boundaries/{boundary_id}
  # TODO: Add DELETE /api/boundaries/{boundary_id}

  # ──────────────────────────────────────────────
  # Layers
  # ──────────────────────────────────────────────
  /api/layers:
    get:
      tags: [Layers]
      summary: List layers for a map area
      parameters:
        - name: map_area_id
          in: query
          required: true
          schema:
            type: integer
          description: Map area ID
      responses:
        '200':
          description: Array of layers
          content:
            application/json:
              schema:
                type: object
                properties:
                  layers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Layer'
        '400':
          description: Missing map_area_id parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    # TODO: Add POST /api/layers

  # TODO: Add GET /api/layers/{layer_id}
  # TODO: Add PUT /api/layers/{layer_id}
  # TODO: Add DELETE /api/layers/{layer_id}

  # ──────────────────────────────────────────────
  # Annotations
  # ──────────────────────────────────────────────
  /api/annotations:
    post:
      tags: [Annotations]
      summary: Create an annotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - layer_id
                - annotation_type
                - coordinates
              properties:
                layer_id:
                  type: integer
                  description: Associated layer ID
                annotation_type:
                  type: string
                  enum: [marker, line, polygon, text]
                  description: Type of annotation
                coordinates:
                  description: Coordinate data (structure depends on annotation type)
                  oneOf:
                    - type: array
                      items:
                        type: number
                      description: "[lat, lon] for markers"
                    - type: array
                      items:
                        type: array
                        items:
                          type: number
                      description: "[[lat, lon], ...] for lines and polygons"
                style:
                  $ref: '#/components/schemas/AnnotationStyle'
                content:
                  type: string
                  description: Text content (for text annotations)
      responses:
        '201':
          description: Created annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    # TODO: Add GET /api/annotations (query param: layer_id)

  # TODO: Add GET /api/annotations/{annotation_id}
  # TODO: Add PUT /api/annotations/{annotation_id}
  # TODO: Add DELETE /api/annotations/{annotation_id}

  # ──────────────────────────────────────────────
  # Exports
  # ──────────────────────────────────────────────
  /api/exports/generate:
    post:
      tags: [Exports]
      summary: Generate a PNG map export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - map_area_id
              properties:
                map_area_id:
                  type: integer
                  description: Map area to export
                zoom:
                  type: integer
                  nullable: true
                  description: Zoom override (null = auto-detect)
                include_annotations:
                  type: boolean
                  default: true
                  description: Whether to draw annotations
                include_boundary:
                  type: boolean
                  default: true
                  description: Whether to draw the boundary outline
                tile_layer:
                  type: string
                  nullable: true
                  description: Tile layer ID (null = use map area's saved value)
                line_width_multiplier:
                  type: number
                  minimum: 0.1
                  maximum: 10
                  default: 1.0
                  description: Multiplier for line widths in the export
      responses:
        '200':
          description: PNG image file
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # TODO: Add GET /api/exports/{filename}

  # ──────────────────────────────────────────────
  # Tiles
  # ──────────────────────────────────────────────
  /api/tiles/wikimedia/{z}/{x}/{y}:
    get:
      tags: [Tiles]
      summary: Proxy a Wikimedia map tile
      description: |
        Fetches a tile from Wikimedia's tile server and returns it.
        Bypasses browser Referer restrictions. Tiles are cached for 24 hours.
      parameters:
        - name: z
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 19
          description: Zoom level (0–19)
        - name: x
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: Tile X coordinate (0 ≤ x < 2^z)
        - name: y
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: Tile Y coordinate (0 ≤ y < 2^z)
      responses:
        '200':
          description: PNG tile image
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid zoom level or tile coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Failed to fetch tile from upstream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: integer
          description: Unique project ID
        name:
          type: string
          description: Project name
        description:
          type: string
          nullable: true
          description: Project description
        center_lat:
          type: number
          description: Default map center latitude
        center_lon:
          type: number
          description: Default map center longitude
        zoom_level:
          type: number
          default: 13
          description: Default map zoom level
        tile_layer:
          type: string
          nullable: true
          description: Default tile layer ID
        created_at:
          type: string
          format: date-time
          description: Timestamp of project creation
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last project update

    MapArea:
      type: object
      properties:
        id:
          type: integer
          description: Unique map area ID
          example: 123
        project_id:
          type: integer
          description: ID of the project this map area belongs to
          example: 1
        parent_id:
          type: integer
          description: ID of the parent map area, if any
          nullable: true
          example: 20
        name:
          type: string
          description: Name of the map area
          example: "Melbourne CBD"
        area_type:
          type: string
          enum: [region, suburb, individual]
          description: Type of the map area
          example: "suburb"
        default_center_lat:
          type: number
          description: Default center latitude for the map area
          example: -37.8136
        default_center_lon:
          type: number
          description: Default center longitude for the map area
          example: 144.9631
        default_zoom:
          type: number
          description: Default zoom level for the map area
          example: 13.5
        created_at:
          type: string
          format: date-time
          description: Timestamp of map area creation
          example: '2026-04-11T07:29:29'
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last map area update
          example: '2026-04-12T15:45:00'

    Boundary:
      type: object
      properties:
        id:
          type: integer
        map_area_id:
          type: integer
        layer_id:
          type: integer
          nullable: true
        coordinates:
          type: array
          items:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          minItems: 3
          description: Array of [lat, lon] pairs (minimum 3)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Layer:
      type: object
      properties:
        id:
          type: integer
        map_area_id:
          type: integer
        parent_layer_id:
          type: integer
          nullable: true
        name:
          type: string
        layer_type:
          type: string
          enum: [annotation, boundary, custom]
        visible:
          type: int
          default: 1
        z_index:
          type: integer
          default: 0
        is_editable:
          type: int
          default: 1
        config:
          type: string
          nullable: true
          properties:
            color:
              type: string
              description: Hex color string (max 20 chars)
            line_thickness:
              type: number
              minimum: 1
              maximum: 20
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Annotation:
      type: object
      properties:
        id:
          type: integer
        layer_id:
          type: integer
        annotation_type:
          type: string
          enum: [marker, line, polygon, text]
        coordinates: {}
        style:
          $ref: '#/components/schemas/AnnotationStyle'
        content:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnnotationStyle:
      type: object
      description: Styling properties for annotations. All fields are optional.
      properties:
        color:
          type: string
          description: "Hex color for stroke (e.g. #ff0000), max 20 chars"
        fillColor:
          type: string
          description: "Hex color for fill (e.g. #00ff00), max 20 chars"
        fillOpacity:
          type: number
          minimum: 0
          maximum: 1
          description: Fill opacity (0–1)
        weight:
          type: number
          minimum: 0
          maximum: 50
          description: Line weight in pixels
        opacity:
          type: number
          minimum: 0
          maximum: 1
          description: Line opacity (0–1)
        dashArray:
          type: string
          maxLength: 50
          description: "Dash pattern (e.g. '5 10 5')"
        lineCap:
          type: string
          enum: [butt, round, square]
        lineJoin:
          type: string
          enum: [miter, round, bevel]
        fontSize:
          type: integer
          minimum: 6
          maximum: 96
          description: Font size in pixels (for text annotations)

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: No data provided

  responses:
    NotFound:
      description: 404 Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: 400 Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaType:
      description: 415 Unsupported media type
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: 500 Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
